# ============================================================
# REDIRECT DOMAIN WWW DAN DOMAIN LAMA KE DOMAIN UTAMA
# ============================================================
server {
    listen 80;

    server_name
        www.aqlammuralkaligrafi.my.id
        azizah.djncloud.my.id
        www.azizah.djncloud.my.id;

    return 301 https://aqlammuralkaligrafi.my.id$request_uri;
}


# ============================================================
# DOMAIN UTAMA AQLAM MURAL KALIGRAFI
# ============================================================
server {
    listen 80;

    server_name aqlammuralkaligrafi.my.id;

    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;
    server_tokens off;

    # ========================================================
    # BATAS UPLOAD FILE
    # ========================================================
    # Maksimal file aplikasi sekitar 2 GB.
    client_max_body_size 2050M;

    # Timeout upload file besar.
    client_body_timeout 3600s;
    send_timeout 3600s;
    keepalive_timeout 65s;


    # ========================================================
    # SECURITY HEADERS
    # ========================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;


    # ========================================================
    # GZIP COMPRESSION
    # ========================================================
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 1024;

    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;


    # ========================================================
    # PUBLIC STORAGE
    # ========================================================
    # Mengarahkan:
    # /storage/namafile
    # ke:
    # /var/www/html/storage/app/public/namafile
    #
    # Storage tidak diblokir karena digunakan untuk gambar
    # produk, portofolio, desain, dan file publik lainnya.
    location = /storage {
        return 301 /storage/;
    }

    # File PHP yang tersimpan di dalam storage tidak boleh
    # dieksekusi atau dibuka.
    location ~* ^/storage/.*\.php$ {
        deny all;
        return 404;
    }

    location /storage/ {
        alias /var/www/html/storage/app/public/;

        access_log off;
        log_not_found off;
        autoindex off;

        add_header Cache-Control "public, max-age=2592000" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header X-Content-Type-Options "nosniff" always;
    }


    # ========================================================
    # LARAVEL VITE BUILD ASSETS
    # ========================================================
    # File hasil build Vite memiliki nama hash, sehingga aman
    # menggunakan cache panjang.
    location ^~ /build/assets/ {
        try_files $uri =404;

        access_log off;
        log_not_found off;

        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }


    # ========================================================
    # FILE YANG TIDAK PERLU DICATAT DI LOG
    # ========================================================
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }


    # ========================================================
    # LARAVEL FRONT CONTROLLER
    # ========================================================
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }


    # ========================================================
    # PHP-FPM
    # ========================================================
    location ~ \.php$ {
        try_files $uri =404;

        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;

        # Memberitahu Laravel bahwa request publik menggunakan HTTPS,
        # walaupun Cloudflare Tunnel meneruskan ke HTTP localhost.
        fastcgi_param HTTPS on;
        fastcgi_param SERVER_PORT 443;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        fastcgi_param HTTP_X_FORWARDED_PORT 443;

        # Mencegah HTTPoxy.
        fastcgi_param HTTP_PROXY "";

        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_pass_request_headers on;

        # Timeout untuk proses upload dan file besar.
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 3600s;
        fastcgi_read_timeout 3600s;

        # Nginx menerima upload terlebih dahulu sebelum diteruskan
        # ke PHP-FPM.
        fastcgi_request_buffering on;
    }


    # ========================================================
    # BLOKIR FILE TERSEMBUNYI DAN FILE SENSITIF
    # ========================================================
    # Contoh: .env, .git, .htaccess.
    # Folder .well-known tetap diperbolehkan.
    location ~ /\.(?!well-known).* {
        deny all;
        return 404;
    }

    location ~* /(composer\.(json|lock)|package(-lock)?\.json|phpunit\.xml|artisan)$ {
        deny all;
        return 404;
    }
}


# ============================================================
# CATCH-ALL HOST YANG TIDAK DIKENAL
# ============================================================
# Mencegah domain asing mengarah ke aplikasi menggunakan
# IP atau port server yang sama.
server {
    listen 80 default_server;

    server_name _;

    return 444;
}