server {
    listen 80;
    server_name azizah.djncloud.my.id;

    root /var/www/html/public;
    index index.php index.html;
    charset utf-8;

    # ============================================================
    # LARGE FILE UPLOAD
    # ============================================================
    #
    # File aplikasi maksimal 2 GB.
    # Nginx diberi sedikit ruang tambahan untuk multipart overhead.
    #
    client_max_body_size 2050M;

    # Timeout ini dihitung ketika koneksi tidak mengirim/menerima data,
    # bukan total durasi upload.
    client_body_timeout 3600s;
    send_timeout 3600s;

    # ============================================================
    # PUBLIC STORAGE
    # ============================================================
    location ^~ /storage/ {
        alias /var/www/html/storage/app/public/;

        access_log off;
        log_not_found off;

        expires 30d;

        add_header Cache-Control "public, max-age=2592000";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ============================================================
    # LARAVEL FRONT CONTROLLER
    # ============================================================
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ============================================================
    # PHP-FPM
    # ============================================================
    location ~ \.php$ {
        try_files $uri =404;

        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;

        # Aplikasi berada di belakang reverse proxy HTTPS.
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;

        # Mencegah HTTPoxy.
        fastcgi_param HTTP_PROXY "";

        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_pass_request_headers on;

        # Timeout proses file besar.
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 3600s;
        fastcgi_read_timeout 3600s;

        # Tetap aktif supaya Nginx menerima upload terlebih dahulu
        # dan worker PHP tidak tertahan selama koneksi pengguna lambat.
        fastcgi_request_buffering on;
    }

    # Melarang akses ke file tersembunyi seperti .env dan .git.
    location ~ /\.(?!well-known).* {
        deny all;
    }
}