; ================================================================
; FILE UPLOAD
; ================================================================

; Batas file aktual: 2 GB.
upload_max_filesize = 2048M

; Harus sedikit lebih besar dari upload_max_filesize karena request
; multipart juga membawa header, CSRF token, dan field lainnya.
post_max_size = 2050M

; Tidak membatasi waktu eksekusi proses upload dan penyimpanan file.
max_execution_time = 0

; Mengikuti max_execution_time.
max_input_time = -1

; Jumlah maksimum file dalam satu request.
max_file_uploads = 20

; ================================================================
; MEMORY
; ================================================================

; Upload Laravel menggunakan temporary file dan tidak semestinya
; memasukkan keseluruhan file 2 GB ke RAM.
memory_limit = 3000M

; ================================================================
; NETWORK / SOCKET
; ================================================================

default_socket_timeout = 3600